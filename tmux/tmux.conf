set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on
set -s escape-time 0
set -g history-limit 5000

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g set-titles on
set -g set-titles-string "#S:#I.#P - #T"

set -g display-panes-time 4000
set -g display-time 4000

set -g status-interval 5
set -g status-keys vi
setw -g mode-keys vi

unbind C-b

bind-key -n ₹ set-option -g prefix ₹ \; bind-key -n ₹ send-prefix \; display "Prefix: ₹"

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L
bind J resize-pane -D
bind K resize-pane -U
bind L resize-pane -R
bind '|' split-window -h
bind - split-window -v
bind c new-window
bind x kill-pane
bind z resize-pane -Z

set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save interval in minutes
set -g @continuum-save-interval '5'
# Auto-restore last session when tmux starts
set -g @continuum-restore 'on'

# Resurrect save/restore keybinds (prefix + key)
# ₹ + Ctrl-s = save, ₹ + Ctrl-r = restore

# Auto-save on first start (so continuum kicks in immediately)
run-shell 'sleep 10 && ~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh &'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
