# AeroSpace configuration — managed by home-manager (symlinked to ~/.config/aerospace/aerospace.toml)
# See https://nikitabobko.github.io/AeroSpace/ for full reference.

config-version = 2

# Start AeroSpace at login (no launchd agent needed)
start-at-login = true

# Don't replace the native macOS menubar.

# Gaps between windows and monitor edges (config-version = 2 syntax)
gaps.inner.horizontal = 8
gaps.inner.vertical   = 8
gaps.outer.left       = 8
gaps.outer.bottom     = 8
gaps.outer.top        = 8
gaps.outer.right      = 8

# Keep the listed workspaces alive even when empty
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

# 'main' binding mode. Uses alt as modifier (no conflict with tmux ₹ or Spotlight Cmd+Space).
[mode.main.binding]
    # Directional focus (alt + hjkl)
    alt-h         = 'focus left'
    alt-j         = 'focus down'
    alt-k         = 'focus up'
    alt-l         = 'focus right'
    alt-tab       = 'workspace-back-and-forth'

    # Layout + window controls
    alt-f         = 'layout tiling'
    alt-r         = 'layout floating'
    alt-enter     = 'fullscreen'
    alt-shift-q   = 'close'

    # Direct workspace jumps (alt + number)
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    # Send focused window to a workspace (alt + shift + number)
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'

    # Reorder focused window within current workspace (i3-like)
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Resize focused window
    alt-minus  = 'resize smart -50'
    alt-equal  = 'resize smart +50'
